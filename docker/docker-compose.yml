# Convenience compose for the loc_eval benchmark container.
#
#   xhost +local:docker          # once on the host, to allow GUI (Gazebo/RViz)
#   docker compose -f docker/docker-compose.yml build
#   docker compose -f docker/docker-compose.yml up -d
#   docker compose -f docker/docker-compose.yml exec loc_eval bash
#
# Results written under /ros2_ws/results in the container land in ./results on the host.
services:
  loc_eval:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: loc_eval:humble
    container_name: loc_eval
    # host networking keeps ROS 2 DDS discovery and X11 simple
    network_mode: host
    # Give Gazebo a large private /dev/shm. (Do NOT use `ipc: host`: it shares the
    # Gazebo IPC/shared-memory namespace with the host, so a Gazebo already running
    # on the host collides — "Entity already exists" / gzserver crashes.)
    shm_size: "2gb"
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - TURTLEBOT3_MODEL=burger
      # Isolate DDS traffic from anything else on the host network:
      - ROS_DOMAIN_ID=42
      # GUI (gui:=true) uses CPU software rendering (llvmpipe). This "just works" on
      # any host, including NVIDIA (whose proprietary GL libs aren't in the container,
      # so hardware GL would fail with `failed to load driver: nouveau`). For hardware
      # GL, install nvidia-container-toolkit and use the `deploy:` block below instead.
      - LIBGL_ALWAYS_SOFTWARE=1
      - GALLIUM_DRIVER=llvmpipe
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./results:/ros2_ws/results
    # keep the container alive so you can `exec` multiple shells into it
    command: ["sleep", "infinity"]

    # --- Optional: NVIDIA hardware GL for a smooth GUI ---------------------------
    # Requires nvidia-container-toolkit on the host. If you enable this, REMOVE the
    # LIBGL_ALWAYS_SOFTWARE / GALLIUM_DRIVER lines above and add:
    #   environment:
    #     - NVIDIA_VISIBLE_DEVICES=all
    #     - NVIDIA_DRIVER_CAPABILITIES=all
    #   deploy:
    #     resources:
    #       reservations:
    #         devices:
    #           - driver: nvidia
    #             count: all
    #             capabilities: [gpu, graphics, display]
